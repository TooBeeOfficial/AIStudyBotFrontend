<div class="bg-gray-100 w-full h-screen flex flex-col">
  <app-navbar>
    <div sideButton class="relative flex items-center navSide z-1">
      @if (!menuOpen) {
        <mat-icon (click)="openMenu()">menu</mat-icon>
      } @else {
        <mat-icon (click)="openMenu()">arrow_back</mat-icon>
      }
    </div>
    <div center class="flex items-center navSide absolute justify-center w-full">
      <mat-icon (click)="quizFormOpen = !quizFormOpen">quiz</mat-icon>
    </div>
    <div
      class="px-3 py-2 rounded bg-transparent hover:bg-gray-300 hover:text-black cursor-pointer"
      (click)="home()"
    >
      Home
    </div>
  </app-navbar>
  @if (quizFormOpen) {
    <div class="absolute w-full h-full z-2 bg-black/30 flex items-center justify-center">
      <div #quizOptions class="w-full h-fit max-w-125 max-h-125 bg-gray-300 rounded-2xl shadow-2xl p-4">
        <form class="w-full h-full flex flex-col justify-between gap-10">
          <h2 class="text-4xl text-gray-900">Quiz Settings</h2>

          <div class="flex flex-col">
            <label for="maxQuestions" class="text-2xl text-gray-700">Maximum Questions</label>
            <input
              id="maxQuestions"
              type="number"
              name="maxQuestions"
              [(ngModel)]="maxQuestions"
              min="1"
              [max]="'(this.quizService.quiz$ | async)?.questions?.length'"
              placeholder="e.g. 10"
              class="p-2 rounded-xl outline outline-solid outline-gray-700 focus:outline-gray-950 focus:outline-2 mt-2"
            />
          </div>

          <fieldset class="">
            <label class="text-2xl text-gray-700">Results Mode</label>

            <div>
              <input type="radio" id="resultsEnd" name="mode" [(ngModel)]="mode" value="end" />
              <label for="resultsEnd"> Show final results at the end </label>
            </div>

            <div>
              <input
                type="radio"
                id="resultsImmediate"
                name="mode"
                [(ngModel)]="mode"
                value="immediate"
              />
              <label for="resultsImmediate">
                Show whether each answer is correct immediately
              </label>
            </div>
          </fieldset>

          <button
            class="bg-gray-900 p-2 text-white rounded-xl cursor-pointer hover:bg-gray-700 transition-all duration-200 w-full"
            type="submit"
            (click)="takeQuiz()"
          >
            Start Quiz
          </button>
        </form>
      </div>
    </div>
  }

  <div class="flex flex-1 min-h-0 h-full">
    <app-side-bar [menuOpen]="menuOpen" (onChangeChatEventChatId)="swapNewQuiz($event)">
    </app-side-bar>
    <div
      class="grid grid-cols-[repeat(auto-fit,minmax(400px,1fr))] grid-rows-[repeat(auto-fit,minmax(fit-content,500px))] w-full h-full gap-7 overflow-scroll place-items-start justify-items-stretch py-14 px-24"
    >
      @if (this.quizService.quiz$ | async; as quiz) {
        @for (item of (this.quizService.quiz$ | async)?.questions; track item.id) {
          <app-question-card [isForQuiz]="true" [question]="item" class="h-full" [question]="item">
          </app-question-card>
        } @empty {
          <div
            class="flex text-gray-300 text-3xl self-center items-center justify-center text-center h-full w-full flex-col"
          >
            No questions yet!
            <div
              (click)="
                this.chatOperationService.createNewQuestion(
                  this.chatOperationService.chatService.getChat?.id!
                )
              "
              class="w-full max-w-75 text-xl text-gray-700 cursor-pointer rounded-lg px-3 py-2 my-4 transition-all duration-200 hover:bg-gray-500 hover:text-white flex items-center justify-center self-center"
            >
              <mat-icon class="overflow-visible mr-2">edit_square</mat-icon>
              <div class="text-2xl whitespace-nowrap">Create a question</div>
            </div>
          </div>
        }
      }
    </div>
  </div>
</div>
