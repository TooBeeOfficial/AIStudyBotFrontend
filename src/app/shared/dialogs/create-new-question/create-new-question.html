<div class="bg-white rounded-xl p-6 w-120">
  <form #form="ngForm" (ngSubmit)="submit(form)">
    <h2 class="text-xl font-semibold mb-4">
      {{ data?.title || 'Create Question' }}
    </h2>
    <input
      name="question"
      [value]="question.question"
      required
      #questionCtrl="ngModel"
      type="text"
      placeholder="Enter question"
      class="w-full border rounded-lg px-3 py-3 mb-4"
      [(ngModel)]="question.question"
    />

    <div class="space-y-3">
      <div class="flex items-center gap-3 flex-col">
        @for (item of question.answers; let i = $index; track $index) {
          <div class="flex w-full">
            <input
              type="radio"
              name="correct"
              [value]="i"
              [(ngModel)]="correctIndex"
              (click)="setCorrectIndex(i)"
            />
            <input
              type="text"
              [value]="item.answer"
              required
              name="answer{{ i }}"
              #answerCtrl="ngModel"
              placeholder="Answer {{ i + 1 }}"
              class="flex-1 w-full border rounded-lg px-3 py-2 ml-3 pb-4"
              [(ngModel)]="item.answer"
            />
          </div>
        }
      </div>
    </div>
    <div class="flex flex-col pt-4 leading-6 text-sm text-red-600">
      {{ errorMessage }}
    </div>

    <button
      type="submit"
      class="mt-5 w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 disabled:opacity-50"
    >
      Save Question
    </button>
  </form>
</div>
