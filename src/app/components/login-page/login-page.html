<div class="flex h-screen flex-col lg:flex-row">
  <div
    class="flex-col bg-gray-100 lg:w-1/2 w-1/2 flex items-center justify-center transition-all duration-300 ease-in-out"
    [ngClass]="signingIn ? 'opacity-0 translate-y-full' : 'opacity-100 translate-y-0'"
  >
    <h3 class="mb-10 text-2xl">Welcome!</h3>
    <form class="flex flex-col gap-1" [formGroup]="loginForm" (ngSubmit)="login()">
      <app-text-form [textForm]="email" formName="E-mail"></app-text-form>
      <app-text-form
        [textForm]="password"
        formName="Password"
        formTextType="password"
        [showHideButton]="true"
      ></app-text-form>
      <app-button variant="primary" [disabled]="signingIn">Sign In!</app-button>
      <button
        type="button"
        [disabled]="signingIn ? true : false"
        class="flex w-full items-center my-2 justify-center gap-3 rounded-xl border border-slate-300 bg-white px-4 py-3 font-medium text-slate-700 shadow-sm transition-all duration-200 hover:bg-slate-50 hover:shadow-md active:scale-[0.98] focus:outline-none"
      >
        <svg class="h-5 w-5" viewBox="0 0 48 48" aria-hidden="true">
          <path
            fill="#FFC107"
            d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.4-.4-3.5z"
          />
          <path
            fill="#FF3D00"
            d="M6.3 14.7l6.6 4.8C14.7 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.1 29.3 4 24 4c-7.7 0-14.3 4.3-17.7 10.7z"
          />
          <path
            fill="#4CAF50"
            d="M24 44c5.2 0 10-2 13.6-5.2l-6.3-5.3c-2.1 1.6-4.7 2.5-7.3 2.5-5.3 0-9.7-3.3-11.3-8l-6.5 5C9.6 39.6 16.2 44 24 44z"
          />
          <path
            fill="#1976D2"
            d="M43.6 20.5H42V20H24v8h11.3c-1.1 3.1-3.3 5.5-6.3 7.1l6.3 5.3C39.5 36.7 44 31 44 24c0-1.3-.1-2.4-.4-3.5z"
          />
        </svg>
        <span>Continue with Google</span>
      </button>
    </form>
  </div>
  <div
    class="flex flex-col w-[50vw] items-center justify-center h-screen transition-transform duration-500 absolute ease-in-out bg-blue-800 z-10 shadow-xl/30"
    [ngClass]="signingIn ? 'translate-x-0' : 'translate-x-full'"
  >
    <div class="text-2xl text-white font-bold mb-20">
        @if (!signingIn) {
        DON'T HAVE AN ACCOUNT?
      } @else {
        ALREADY HAVE AN ACCOUNT?
      }
    </div>
    <app-button [disabled]="false" (clicked)="flipSignIn()" variant="white">
      @if (!signingIn) {
        Sign up!
      } @else {
        Sign In!
      }
    </app-button>
  </div>
  <div
    class="flex w-full flex-col items-center justify-center bg-gray-100 lg:w-1/2 transition-all duration-300 ease-in-out"
    [ngClass]="signingIn ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-full'"
  >
    <h3 class="mb-10 text-2xl">Join us!</h3>
    <form class="flex flex-col gap-1" [formGroup]="loginForm" (ngSubmit)="login()">
      <app-text-form [textForm]="username" formName="Username"></app-text-form>
      <app-text-form [textForm]="email" formName="E-mail"></app-text-form>
      <app-text-form
        [textForm]="password"
        formName="Password"
        formTextType="password"
        [showHideButton]="true"
      ></app-text-form>
      <app-button variant="primary" [disabled]="!signingIn">Sign up!</app-button>
      <button
        type="button"
        [disabled]="signingIn ? false : true"
        class="flex w-full items-center justify-center gap-3 rounded-xl border border-slate-300 bg-white px-4 py-3 my-2 font-medium text-slate-700 shadow-sm transition-all duration-200 hover:bg-slate-50 hover:shadow-md active:scale-[0.98] focus:outline-none"
      >
        <svg class="h-5 w-5" viewBox="0 0 48 48" aria-hidden="true">
          <path
            fill="#FFC107"
            d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.4-.4-3.5z"
          />
          <path
            fill="#FF3D00"
            d="M6.3 14.7l6.6 4.8C14.7 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.1 29.3 4 24 4c-7.7 0-14.3 4.3-17.7 10.7z"
          />
          <path
            fill="#4CAF50"
            d="M24 44c5.2 0 10-2 13.6-5.2l-6.3-5.3c-2.1 1.6-4.7 2.5-7.3 2.5-5.3 0-9.7-3.3-11.3-8l-6.5 5C9.6 39.6 16.2 44 24 44z"
          />
          <path
            fill="#1976D2"
            d="M43.6 20.5H42V20H24v8h11.3c-1.1 3.1-3.3 5.5-6.3 7.1l6.3 5.3C39.5 36.7 44 31 44 24c0-1.3-.1-2.4-.4-3.5z"
          />
        </svg>
        <span>Continue with Google</span>
      </button>
    </form>
  </div>
</div>
