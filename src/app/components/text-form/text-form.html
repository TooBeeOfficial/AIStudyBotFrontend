<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
<div class="flex flex-col gap-2 w-full">
  <label for="formControl" class="text-sm font-medium text-slate-700">{{ formName }}</label>
  <div class="relative w-full flex">
    <input
      showError
      id="formControl"
      [type]="formTextType"
      [formControl]="form"
      class="w-xs rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 placeholder:text-slate-400 shadow-sm transition-all duration-200 outline-none focus:border-amber-500 focus:ring-4 focus:ring-amber-100 disabled:cursor-not-allowed disabled:bg-slate-100"
    />
    @if (showHideButton) {
      <button
        type="button"
        (click)="hidePassword()"
        class="absolute w-1 text-slate-500 hover:text-gray-700 right-4 px-4 py-3"
      >
        <mat-icon>
          {{ showPassword ? 'visibility_off' : 'visibility' }}
        </mat-icon>
      </button>
    }
  </div>
  <div
    class="overflow-hidden transition-all duration-300 ease-out"
    [class.max-h-0]="!(form.touched && form.errors)"
    [class.max-h-40]="form.touched && form.errors"
    [class.opacity-0]="!(form.touched && form.errors)"
    [class.opacity-100]="form.touched && form.errors"
    [class.translate-y-[-4px]]="!(form.touched && form.errors)"
    [class.translate-y-0]="form.touched && form.errors"
  >
    <div class="flex flex-col gap-1 pt-1 h-12 leading-6">
      @for (errorKey of ObjectKeys(form.errors ?? {}); track errorKey) {
        <div class="text-sm text-red-600">
          {{ getErrorMessage(errorKey) }}
        </div>
      }
    </div>
  </div>
</div>
